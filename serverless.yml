resources:
  Resources:
    S3BucketImages:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${self:provider.stage}-media
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
              AllowedOrigins: ['*']

    S3BucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref S3BucketImages
        PolicyDocument:
          Statement:
            - Action:
                - s3:GetObject
              Effect: Allow
              Resource: !Sub "arn:aws:s3:::${self:service}-${self:provider.stage}-media/logotipos/*"
              Principal: "*"

    S3BucketEvidencia:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-${self:provider.stage}-evidencia
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST, DELETE, HEAD]
              AllowedOrigins: ['*']
              MaxAge: 3000

    # Cognito User Pool
    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${self:provider.stage}-user-pool
        AdminCreateUserConfig:
          InviteMessageTemplate:
            EmailSubject: "Bienvenido a SIGA - Credenciales de Acceso"
            EmailMessage: "Bienvenido al Sistema Integral de Gestión Automotriz, su usuario es:{username} y su contraseña temporal es: {####}"
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: true
            RequireUppercase: true
        Schema:
          - Name: tenant_id
            AttributeDataType: String
            Mutable: true
            Required: false

    # Cognito User Pool Client
    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${self:provider.stage}-client
        UserPoolId: !Ref CognitoUserPool
        ExplicitAuthFlows:
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
          - ALLOW_USER_SRP_AUTH
        PreventUserExistenceErrors: ENABLED
        IdTokenValidity: 5
        AccessTokenValidity: 5
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          IdToken: hours
          RefreshToken: days

    # Cognito User Pool Groups
    CognitoGroupSuperAdmin:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: SUPER_ADMIN
        UserPoolId: !Ref CognitoUserPool
        Description: "Super Administradores del sistema"
        
    CognitoGroupAdmin:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: ADMIN
        UserPoolId: !Ref CognitoUserPool
        Description: "Administradores de los talleres"

    CognitoGroupAsesor:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: ASESOR
        UserPoolId: !Ref CognitoUserPool
        Description: "Asesores de los talleres"

    CognitoGroupMecanico:
      Type: AWS::Cognito::UserPoolGroup
      Properties:
        GroupName: MECANICO
        UserPoolId: !Ref CognitoUserPool
        Description: "Mecánicos de los talleres"
