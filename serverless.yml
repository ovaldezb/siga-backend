service: siga-backend
useDotenv: true

provider:
  name: aws
  runtime: python3.11
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 256
  timeout: 29
  versionFunctions: false
  iam:
    role:
      statements:
        - Effect: "Allow"
          Action:
            - "cognito-idp:AdminCreateUser"
            - "cognito-idp:AdminDeleteUser"
            - "cognito-idp:AdminDisableUser"
            - "cognito-idp:AdminEnableUser"
            - "cognito-idp:AdminGetUser"
            - "cognito-idp:ListUsers"
            - "cognito-idp:AdminUpdateUserAttributes"
            - "cognito-idp:AdminAddUserToGroup"
            - "cognito-idp:AdminRemoveUserFromGroup"
            - "cognito-idp:AdminListGroupsForUser"
            - "cognito-idp:ListUsersInGroup"
          Resource: 
            - !GetAtt CognitoUserPool.Arn
        - Effect: "Allow"
          Action:
            - "s3:PutObject"
            - "s3:GetObject"
            - "s3:DeleteObject"
            - "s3:PutObjectAcl"
          Resource: 
            - !Sub "arn:aws:s3:::${self:service}-${self:provider.stage}-media/*"
        - Effect: "Allow"
          Action:
            - "s3:PutObject"
            - "s3:GetObject"
            - "s3:DeleteObject"
          Resource:
            - !Sub "arn:aws:s3:::${self:service}-${self:provider.stage}-evidencia/*"
  environment:
    STAGE: ${self:provider.stage}
    MONGO_USER: ${env:MONGO_USER, ''}
    MONGO_PASSWORD: ${env:MONGO_PASSWORD, ''}
    MONGO_HOST: ${env:MONGO_HOST, ''}
    MONGO_DB: ${env:MONGO_DB, 'siga'}
    COGNITO_USER_POOL_ID: !Ref CognitoUserPool
    COGNITO_CLIENT_ID: !Ref CognitoUserPoolClient
    S3_MEDIA_BUCKET: ${self:service}-${self:provider.stage}-media
    S3_EVIDENCIA_BUCKET: ${self:service}-${self:provider.stage}-evidencia
    # Default mock para dev/staging. El GH secret CLIENT_LINK_SECRET sobreescribe este
    # valor en el pipeline (deploy-dev.yml lo appendea al .env antes de `sls deploy`).
    # ANTES DE PRODUCCIÓN: setear CLIENT_LINK_SECRET en repo secrets y rotar este default.
    CLIENT_LINK_SECRET: ${env:CLIENT_LINK_SECRET, 'mock-dev-secret-NOT-FOR-PROD-rotate-via-gh-secret-2026'}
    CLIENT_LINK_BASE_URL: ${env:CLIENT_LINK_BASE_URL, ''}
    # Sentry — DSN vacío deja el SDK deshabilitado (sin tráfico ni costo).
    # Setear SENTRY_DSN en GH Actions secrets para activar reporte de errores 5xx.
    SENTRY_DSN: ${env:SENTRY_DSN, ''}
    SENTRY_ENVIRONMENT: ${env:SENTRY_ENVIRONMENT, ''}
    SENTRY_TRACES_SAMPLE_RATE: ${env:SENTRY_TRACES_SAMPLE_RATE, '0'}
    CLIP_API_KEY: ${env:CLIP_API_KEY, ''}
    CLIP_SECRET_KEY: ${env:CLIP_SECRET_KEY, ''}
  httpApi:
    payload: '1.0'
    cors: true
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl:
          Fn::Join:
            - ""
            - - "https://cognito-idp."
              - ${aws:region}
              - ".amazonaws.com/"
              - Ref: CognitoUserPool
        audience:
          - Ref: CognitoUserPoolClient

plugins:
  - serverless-python-requirements
  - serverless-plugin-split-stacks

custom:
  pythonRequirements:
    dockerizePip: non-linux
    layer:
      name: ${self:service}-${self:provider.stage}-lib
      description: Python requirements layer
      compatibleRuntimes:
        - python3.11
  splitStacks:
    nestedStackTrace: true
    perFunction: true
    perType: false
    perGroupFunction: false
    nestedStackCount: 20

package:
  individually: true
  patterns:
    - '!node_modules/**'
    - '!tests/**'
    - '!.venv/**'
    - '!package.json'
    - '!package-lock.json'
    - '!requirements.txt'

functions:
